# docker-compose.bots.yml — start every example bot with one command.
#
# Runs all 5 example bots, each in its own container. This file does NOT start
# the server — bring that up separately first:
#
#   docker compose up -d              # the battle-sim server (docker-compose.yml)
#   # ...or `cargo run` in server/    # a locally-built server
#
# Then start every bot:
#
#   docker compose -f docker-compose.bots.yml up --build
#
# The bots reach the server at ${SERVER_HOST:-host.docker.internal}:${SERVER_PORT:-7878}.
# `host.docker.internal` resolves to the Docker host, where the server publishes
# port 7878. Point the bots at a server elsewhere with:
#
#   SERVER_HOST=192.168.1.50 docker compose -f docker-compose.bots.yml up --build
#
# Bots restart on exit, so they rejoin the lobby for each new match. Stop them
# all with Ctrl-C, or `docker compose -f docker-compose.bots.yml down`.

name: battle-sim-bots

# ---- shared service definitions ----------------------------------------------
x-python-bot: &python-bot
  build:
    context: .
    dockerfile: bots.python.Dockerfile
  image: battle-sim-bot-python:local
  extra_hosts:
    # Lets `host.docker.internal` resolve to the Docker host on Linux too
    # (Docker Desktop on Windows/macOS already provides it).
    - "host.docker.internal:host-gateway"
  init: true
  restart: unless-stopped

services:
  bot-circler:
    <<: *python-bot
    command: ["bots/circle_bot.py", "--host", "${SERVER_HOST:-host.docker.internal}", "--port", "${SERVER_PORT:-7878}", "--name", "circler"]

  bot-warlord:
    <<: *python-bot
    command: ["bots/powerful_bot.py", "--host", "${SERVER_HOST:-host.docker.internal}", "--port", "${SERVER_PORT:-7878}", "--name", "warlord"]

  bot-strategist:
    <<: *python-bot
    command: ["bots/strategist_bot.py", "--host", "${SERVER_HOST:-host.docker.internal}", "--port", "${SERVER_PORT:-7878}", "--name", "strategist"]

  bot-tactician:
    <<: *python-bot
    command: ["bots/tactician_bot.py", "--host", "${SERVER_HOST:-host.docker.internal}", "--port", "${SERVER_PORT:-7878}", "--name", "tactician"]

  bot-tracker:
    <<: *python-bot
    command: ["bots/tracking_bot.py", "--host", "${SERVER_HOST:-host.docker.internal}", "--port", "${SERVER_PORT:-7878}", "--name", "tracker"]
